<!-- Bandwidth Detection (Early) -->
<script>
  (function() {
    // Early bandwidth detection to prevent unnecessary resource loading
    const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    let bandwidthMode = 'high';
    
    if (connection) {
      const effectiveType = connection.effectiveType;
      const saveData = connection.saveData;
      
      if (saveData || effectiveType === '2g' || effectiveType === 'slow-2g') {
        bandwidthMode = 'low';
      } else if (effectiveType === '3g') {
        bandwidthMode = 'medium';
      }
    }
    
    // Check for saved preference
    const savedMode = localStorage.getItem('geoForecast_bandwidth');
    if (savedMode) {
      bandwidthMode = savedMode;
    }
    
    // Check URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const urlMode = urlParams.get('bandwidth');
    if (urlMode && ['high', 'medium', 'low'].includes(urlMode)) {
      bandwidthMode = urlMode;
    }
    
    // Store for use by other scripts
    window.__BANDWIDTH_MODE__ = bandwidthMode;
    document.documentElement.setAttribute('data-bandwidth', bandwidthMode);
    
    // Apply bandwidth class immediately
    document.documentElement.classList.add('bandwidth-' + bandwidthMode);
  })();
</script>
